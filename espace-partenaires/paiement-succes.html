<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Confirmation d'abonnement — Optimmo Dom</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/shared.css" />

  <style>
    body { background: var(--ink); display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 40px 24px; }
    .confirm {
      max-width: 480px; width: 100%; text-align: center;
      background: var(--ink-mid); border: 1px solid rgba(201,168,76,0.18);
      padding: 56px 48px;
    }
    .confirm-icon {
      width: 64px; height: 64px; border-radius: 50%;
      margin: 0 auto 28px; display: flex; align-items: center; justify-content: center;
    }
    .confirm-icon.ok { border: 2px solid var(--success); }
    .confirm-icon.ko { border: 2px solid var(--error); }
    .confirm-icon.load { border: 2px solid rgba(201,168,76,0.2); border-top-color: var(--gold); animation: spin 800ms linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .confirm-icon svg { width: 28px; height: 28px; }
    .confirm-icon.ok svg { color: var(--success); }
    .confirm-icon.ko svg { color: var(--error); }
    .confirm-label { font-size: 10px; font-weight: 700; letter-spacing: 0.24em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    .confirm-title { font-family: var(--serif); font-size: 32px; font-weight: 300; color: var(--white); margin-bottom: 14px; line-height: 1.2; }
    .confirm-title em { font-style: italic; color: var(--gold); }
    .confirm-text { font-size: 15px; color: rgba(255,255,255,0.55); line-height: 1.7; margin-bottom: 32px; }
    .confirm-actions { display: flex; flex-direction: column; gap: 12px; }
  </style>
</head>
<body>
  <div class="confirm">
    <div class="confirm-icon load" id="icon">
      <svg id="icon-svg" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"></svg>
    </div>
    <div class="confirm-label">Espace Partenaires</div>
    <h1 class="confirm-title" id="title">Activation en cours…</h1>
    <p class="confirm-text" id="text">Nous confirmons votre abonnement auprès de PayPal, merci de patienter quelques instants.</p>
    <div class="confirm-actions" id="actions"></div>
  </div>

  <script>
    'use strict';
    const params = new URLSearchParams(window.location.search);
    const subId = params.get('subscription_id') || params.get('ba_token');
    const token = localStorage.getItem('optimmo_token');
    const authHeaders = token ? { 'Authorization': 'Bearer ' + token } : {};

    const CHECK = '<path d="M5 13l4 4L19 7"/>';
    const CROSS = '<path d="M6 6l12 12M18 6L6 18"/>';

    function setState(state, title, text, actions) {
      const icon = document.getElementById('icon');
      const svg = document.getElementById('icon-svg');
      icon.className = 'confirm-icon ' + state;
      if (state !== 'load') { svg.style.display = ''; svg.innerHTML = state === 'ok' ? CHECK : CROSS; }
      document.getElementById('title').innerHTML = title;
      document.getElementById('text').textContent = text;
      document.getElementById('actions').innerHTML = actions;
    }

    async function activate() {
      if (!subId) {
        setState('ko', 'Référence manquante',
          "Nous n'avons pas pu récupérer la référence de votre abonnement.",
          '<a class="btn-gold-border" href="./dashboard.html">Retour au tableau de bord</a>');
        return;
      }
      try {
        const res = await fetch('/api/paypal/subscription', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json', ...authHeaders },
          body: JSON.stringify({ action: 'activate', subscription_id: subId }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.success) {
          setState('ok', 'Abonnement <em>confirmé</em>',
            'Votre formule ' + (data.plan || '') + ' est désormais active. Tous les outils correspondants sont débloqués.',
            '<a class="btn-gold" href="./dashboard.html?paiement=succes">Accéder à mes outils →</a>');
        } else if (res.status === 401) {
          setState('ko', 'Session expirée',
            'Reconnectez-vous pour finaliser l\'activation de votre abonnement.',
            '<a class="btn-gold-border" href="./index.html">Se reconnecter</a>');
        } else {
          setState('ko', 'Activation impossible',
            data.error || 'Votre abonnement n\'a pas pu être activé automatiquement. Notre équipe a été notifiée.',
            '<a class="btn-gold-border" href="./dashboard.html">Retour au tableau de bord</a>');
        }
      } catch (e) {
        setState('ko', 'Connexion impossible',
          'Le service est momentanément indisponible. Votre paiement reste valide, réessayez dans quelques minutes.',
          '<a class="btn-gold-border" href="./dashboard.html">Retour au tableau de bord</a>');
      }
    }
    activate();
  </script>
</body>
</html>
